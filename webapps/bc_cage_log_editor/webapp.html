<!-- BC Cage Log Editor — HTML tab of the Standard webapp -->
<div class="cage-app">
  <header class="cage-header">
    <h1>BC Cage Log</h1>
    <div class="cage-sub" id="source-line">Loading…</div>
  </header>

  <section class="cage-card">
    <h2>Add new entry</h2>
    <form id="add-form" class="cage-form" autocomplete="off">
      <!-- inputs generated from the dataset schema by webapp.js -->
      <div id="form-fields" class="cage-fields"></div>
      <div class="cage-actions">
        <button type="submit" class="btn btn-add">+ Add to table</button>
        <button type="button" id="save-btn" class="btn btn-save" disabled>
          Save all to <span id="output-name">output</span>
        </button>
        <span id="status-msg" class="cage-status"></span>
      </div>
    </form>
  </section>

  <section class="cage-card">
    <div class="cage-table-head">
      <h2>Log entries</h2>
      <input type="search" id="table-filter" placeholder="Filter rows…">
      <span id="row-count" class="cage-sub"></span>
    </div>
    <div class="cage-table-wrap">
      <table id="log-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</div>
